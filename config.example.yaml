# hh-apply — конфигурация автооткликов
# Документация: https://github.com/nightmarovvv/hh-autoapply

# === Поиск ===
search:
  query: "python developer"      # Поисковый запрос
  # area: 1                      # ID региона (1=Москва, 2=СПб, 113=Россия)
  # salary_from: 150000          # Минимальная зарплата
  # salary_only: true            # Только с указанной зарплатой
  # experience: "between3And6"   # noExperience, between1And3, between3And6, moreThan6
  # employment: ["full"]         # full, part, project, volunteer
  # schedule: ["remote"]         # remote, fullDay, shift, flexible, flyInFlyOut
  # search_period: 7             # Дней: 1, 3, 7, 30
  # order_by: "relevance"        # relevance, publication_time, salary_desc, salary_asc

# === Фильтры вакансий ===
filters:
  exclude_companies: []           # ["Компания1", "Компания2"]
  exclude_keywords: []            # ["стажёр", "intern"] — в названии вакансии
  # exclude_pattern: ""           # Regex по названию: "junior|стажёр|bitrix"
  # exclude_company_pattern: ""   # Regex по компании: "аутсорс|крипто|казино"
  skip_foreign: false             # Пропускать зарубежные
  skip_test_vacancies: true       # Тестовые → в отчёт для ручного отклика

# === Отклик ===
apply:
  max_applications: 50            # Лимит за один запуск
  use_cover_letter: true
  cover_letter: |
    Здравствуйте!

    Меня заинтересовала вакансия {position} в {company}.
    Буду рад обсудить детали.

    С уважением
  # Доступные переменные: {company}, {position}
  delay_min: 1.5                  # Мин. задержка между откликами (сек)
  delay_max: 4.0                  # Макс. задержка

# === Браузер ===
browser:
  headless: false                 # true = без окна
  # proxy: "http://user:pass@host:port"
  data_dir: "~/.hh-apply"        # Куки, БД, логи
