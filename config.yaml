# Конфигурация автооткликов hh.ru

# Поисковый запрос
search_query: "aqa"

# Сбросить все фильтры перед поиском (включая регион)
# true = ищет по всей России, false = по выбранному региону
reset_filters: true

# Использовать сопроводительное письмо
# true = вставлять письмо если hh.ru просит (или всегда)
# false = откликаться без письма
use_cover_letter: true

# Шаблон сопроводительного письма
cover_letter: |
  Здравствуйте!

  Меня заинтересовала ваша вакансия. Буду рад обсудить детали.

  С уважением,
  Алексей

# Максимум откликов за один запуск
max_applications: 50

# Задержка между откликами (секунды, рандом в диапазоне)
delay_min: 5
delay_max: 12

# Путь к файлу сохранённой сессии
storage_state_path: data/storage_state.json

# Путь к базе данных трекера
db_path: data/applications.db

# Режим headless (false = видимый браузер, true = без окна)
headless: false
